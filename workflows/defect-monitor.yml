name: Defect Monitor

# Fires whenever a monitored workflow finishes. On failure/timeout it appends
# a row to defects/defect-log.md so recurring issues are visible and fixable.

on:
  workflow_run:
    workflows:
      - "Run Skyvern Job Application Workflow"
      - "Log Application Result"
      - "Mirror Application Log"
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  log-defect:
    if: contains(fromJSON('["failure","timed_out"]'), github.event.workflow_run.conclusion)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Append defect entry
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          f=defects/defect-log.md
          mkdir -p defects
          if [ ! -f "$f" ]; then
            {
              echo "# Defect Log"
              echo ""
              echo "Auto-generated by defect-monitor.yml. Newest entries at the bottom."
              echo ""
              echo "| Date (UTC) | Workflow | Conclusion | Failed step | Error detail | Run |"
              echo "|---|---|---|---|---|---|"
            } > "$f"
          fi
          step=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[].steps[]? | select(.conclusion=="failure") | .name] | first // "unknown"' || echo unknown)
          detail=$(gh api "repos/$REPO/actions/runs/$RUN_ID/jobs" \
            --jq '[.jobs[] | select(.conclusion=="failure") | .name] | first // ""' | head -c 200 || echo "")
          printf '| %s | %s | %s | %s | %s | [run](%s) |\n' \
            "$(date -u +'%Y-%m-%d %H:%M')" "$WF_NAME" "$CONCLUSION" "$step" "$detail" "$RUN_URL" >> "$f"
          git config user.name "defect-monitor[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$f"
          git commit -m "defects: $WF_NAME failed (run $RUN_ID)"
          git pull --rebase origin main || true
          git push
